<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayTrace Mission Control</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080B14;
            --card-surface: rgba(255, 255, 255, 0.04);
            --primary: #00FFB2;
            --primary-glow: rgba(0, 255, 178, 0.15);
            --primary-glow-strong: rgba(0, 255, 178, 0.4);
            --warning: #FFB800;
            --warning-glow: rgba(255, 184, 0, 0.2);
            --text-main: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.5);
            --border-color: rgba(0, 255, 178, 0.15);
            --base-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0,255,178,0.04);
            --hover-shadow: 0 24px 48px rgba(0, 0, 0, 0.6), 0 0 40px rgba(0,255,178,0.08);
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-body);
            box-sizing: border-box;
            position: relative;
        }

        *, *:before, *:after {
            box-sizing: inherit;
        }

        /* Animated Grid Background */
        body::before {
            content: "";
            position: absolute;
            inset: -50%;
            z-index: -2;
            background-image: 
                radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-position: 0 0, 25px 25px;
            background-size: 50px 50px;
            animation: drift 60s linear infinite;
        }

        /* Scanline Overlay */
        body::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.15),
                rgba(0,0,0,0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            opacity: 0.5;
        }

        @keyframes drift {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        @keyframes riseUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .container {
            max-width: 1400px;
            height: 100vh;
            margin: 0 auto;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        header {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--primary);
            box-shadow: 0 4px 20px var(--primary-glow);
            position: relative;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-family: var(--font-display);
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-shadow: 0 0 10px var(--primary-glow-strong);
        }

        .timestamp {
            font-size: 12px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            opacity: 0.7;
        }

        /* Floating Cards */
        .card {
            background: var(--card-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--base-shadow);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-style: preserve-3d;
            opacity: 0;
            animation: riseUp 0.8s ease-out forwards;
        }

        .card:hover {
            box-shadow: var(--hover-shadow);
            transform: perspective(1000px) rotateX(-1deg) translateY(-4px);
            border-color: rgba(0, 255, 178, 0.4);
            z-index: 20;
        }

        /* Warning State for Completion Card */
        .card.warning {
            border-color: var(--warning);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 20px var(--warning-glow);
        }
        .card.warning:hover {
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 184, 0, 0.15);
            border-color: rgba(255, 184, 0, 0.6);
        }
        .card.warning .kpi-value {
            color: var(--warning);
            text-shadow: 0 0 15px rgba(255, 184, 0, 0.4);
        }

        /* KPI Grid */
        .kpi-grid {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .kpi-card {
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation-delay: 0.1s;
        }
        .kpi-grid .kpi-card:nth-child(2) { animation-delay: 0.2s; }
        .kpi-grid .kpi-card:nth-child(3) { animation-delay: 0.3s; }
        .kpi-grid .kpi-card:nth-child(4) { animation-delay: 0.4s; }

        .kpi-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .kpi-value {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow-strong);
        }

        /* Chart Grid */
        .chart-grid {
            flex-grow: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-grid:last-child {
            margin-bottom: 0;
        }

        .chart-card {
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .chart-grid:nth-of-type(1) .chart-card:nth-child(1) { animation-delay: 0.5s; }
        .chart-grid:nth-of-type(1) .chart-card:nth-child(2) { animation-delay: 0.6s; }
        .chart-grid:nth-of-type(2) .chart-card:nth-child(1) { animation-delay: 0.7s; }
        .chart-grid:nth-of-type(2) .chart-card:nth-child(2) { animation-delay: 0.8s; }

        .chart-title {
            flex-shrink: 0;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 16px;
            margin-top: 0;
            color: var(--text-main);
        }

        .chart-container {
            flex-grow: 1;
            min-height: 0;
            position: relative;
            width: 100%;
        }

        .chart-finding {
            flex-shrink: 0;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            line-height: 1.5;
            letter-spacing: 0.02em;
        }

        @media (max-width: 768px) {
            body, html { height: auto; overflow: auto; }
            .container { height: auto; padding: 16px; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .chart-grid { grid-template-columns: 1fr; }
            .chart-container { min-height: 220px; }
            .card { transform: none !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>PlayTrace</h1>
            <div class="timestamp" id="lastUpdated">SYS.SYNC: STANDBY</div>
        </header>

        <div class="kpi-grid">
            <div class="card kpi-card">
                <div class="kpi-label">Total Sessions</div>
                <div class="kpi-value" id="kpi-sessions">0</div>
            </div>
            <div class="card kpi-card">
                <div class="kpi-label">Events Logged</div>
                <div class="kpi-value" id="kpi-events">0</div>
            </div>
            <div class="card kpi-card" id="kpi-completion-card">
                <div class="kpi-label">Completion Rate</div>
                <div class="kpi-value"><span id="kpi-completion">0.0</span>%</div>
            </div>
            <div class="card kpi-card">
                <div class="kpi-label">Avg Decision Time</div>
                <div class="kpi-value"><span id="kpi-time">0.0</span>s</div>
            </div>
        </div>

        <div class="chart-grid">
            <div class="card chart-card">
                <h2 class="chart-title">Behavioral Profile</h2>
                <div class="chart-container">
                    <canvas id="behaviorChart"></canvas>
                </div>
                <div class="chart-finding" id="finding-behavior">Awaiting telemetry...</div>
            </div>
            <div class="card chart-card">
                <h2 class="chart-title">Decision Time Distribution</h2>
                <div class="chart-container">
                    <canvas id="timeChart"></canvas>
                </div>
                <div class="chart-finding" id="finding-time">Awaiting telemetry...</div>
            </div>
        </div>

        <div class="chart-grid">
            <div class="card chart-card">
                <h2 class="chart-title">Session Risk Metrics</h2>
                <div class="chart-container">
                    <canvas id="riskChart"></canvas>
                </div>
                <div class="chart-finding" id="finding-risk">Awaiting telemetry...</div>
            </div>
            <div class="card chart-card">
                <h2 class="chart-title">Scenario Funnel</h2>
                <div class="chart-container">
                    <canvas id="funnelChart"></canvas>
                </div>
                <div class="chart-finding" id="finding-funnel">Awaiting telemetry...</div>
            </div>
        </div>
    </div>

    <script>
        // Techy Color Palette
        const colors = {
            primary: '#00FFB2',
            secondary: '#00CCFF',
            tertiary: '#B200FF',
            quaternary: '#FF0055',
            warning: '#FFB800',
            grid: 'rgba(255,255,255,0.05)',
            text: 'rgba(255,255,255,0.5)',
            tooltipBg: 'rgba(8, 11, 20, 0.8)'
        };

        const palette = [colors.primary, colors.secondary, colors.warning, colors.tertiary, colors.quaternary];

        // Global Chart Defaults
        Chart.defaults.color = colors.text;
        Chart.defaults.font.family = "'Space Grotesk', sans-serif";
        Chart.defaults.font.size = 10;
        
        // Glassmorphism Tooltips
        const tooltipOptions = {
            backgroundColor: colors.tooltipBg,
            titleFont: { family: "'Space Grotesk', sans-serif", size: 11 },
            bodyFont: { family: "'Space Grotesk', sans-serif", size: 11 },
            padding: 10,
            borderColor: 'rgba(0, 255, 178, 0.2)',
            borderWidth: 1,
            cornerRadius: 4,
            displayColors: true
        };

        // Number Counter Animation
        function animateValue(id, start, end, duration, isPercent = false) {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // Ease out quad
                const easeOut = progress * (2 - progress);
                const val = easeOut * (end - start) + start;
                obj.innerHTML = isPercent ? val.toFixed(1) : Math.floor(val);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        async function init() {
            try {
                const [metaRes, eventsRes, sessionsRes] = await Promise.all([
                    fetch('data/meta.json').catch(() => ({ json: () => ({ lastUpdated: new Date().toISOString() }) })),
                    fetch('data/events.json'),
                    fetch('data/sessions.json')
                ]);
                
                const meta = await (metaRes.ok ? metaRes.json() : { lastUpdated: new Date().toISOString() });
                const events = await eventsRes.json();
                const sessions = await sessionsRes.json();

                const updatedDate = new Date(meta.lastUpdated);
                document.getElementById('lastUpdated').textContent = `SYS.SYNC: ${updatedDate.toLocaleTimeString()}`;

                computeSessionMetrics(events, sessions);
                computeKPIs(events, sessions);
                drawBehaviorChart(events);
                drawTimeChart(events);
                drawRiskChart(sessions);
                drawFunnelChart(events);

            } catch (err) {
                console.error("Data load failed", err);
                document.getElementById('lastUpdated').textContent = "SYS.ERR: CONNECTION FAILED";
            }
        }

        function computeSessionMetrics(events, sessions) {
            const eventsBySession = {};
            events.forEach(e => {
                if (!eventsBySession[e.sessionId]) eventsBySession[e.sessionId] = [];
                eventsBySession[e.sessionId].push(e);
            });

            sessions.forEach(s => {
                const sEvents = eventsBySession[s.sessionId] || [];
                if (!s.metrics) s.metrics = {};

                const times = sEvents.map(e => e.decisionTimeMs).filter(t => t != null);
                if (times.length > 0) {
                    s.metrics.avgDecisionTime = times.reduce((a, b) => a + b, 0) / times.length;
                } else {
                    s.metrics.avgDecisionTime = null;
                }

                if (sEvents.length > 0) {
                    const riskCount = sEvents.filter(e => e.tags && e.tags[0] === 'risk').length;
                    s.metrics.riskScore = riskCount / sEvents.length;

                    const pressureCount = sEvents.filter(e => e.tags && (e.tags[0] === 'pressure_sensitive' || (e.tags.length > 1 && e.tags[1] === 'pressure_sensitive'))).length;
                    s.metrics.pressureSensitivity = pressureCount / sEvents.length;

                    const tagCounts = {};
                    let maxCount = 0;
                    sEvents.forEach(e => {
                        if (e.tags && e.tags[0]) {
                            const t = e.tags[0];
                            tagCounts[t] = (tagCounts[t] || 0) + 1;
                            if (tagCounts[t] > maxCount) maxCount = tagCounts[t];
                        }
                    });
                    s.metrics.consistencyScore = maxCount / sEvents.length;
                } else {
                    s.metrics.riskScore = null;
                    s.metrics.pressureSensitivity = null;
                    s.metrics.consistencyScore = null;
                }
            });
        }

        function computeKPIs(events, sessions) {
            const totalSessions = sessions.length;
            animateValue("kpi-sessions", 0, totalSessions, 1500);

            const totalEvents = events.length;
            animateValue("kpi-events", 0, totalEvents, 1500);

            const completedSessions = sessions.filter(s => s.metrics && s.metrics.avgDecisionTime != null);
            const completionRate = totalSessions > 0 ? (completedSessions.length / totalSessions) * 100 : 0;
            
            animateValue("kpi-completion", 0, completionRate, 1500, true);
            
            if (completionRate < 20) {
                document.getElementById('kpi-completion-card').classList.add('warning');
            }

            let sumTime = 0;
            completedSessions.forEach(s => sumTime += s.metrics.avgDecisionTime);
            const avgTime = completedSessions.length > 0 ? (sumTime / completedSessions.length) / 1000 : 0;
            animateValue("kpi-time", 0, avgTime, 1500, true);
        }

        function drawBehaviorChart(events) {
            const tagCounts = {};
            let riskCount = 0;
            events.forEach(e => {
                if (e.tags && e.tags[0]) {
                    const tag = e.tags[0];
                    tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                    if (tag === 'risk') riskCount++;
                }
            });

            const sortedTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);
            const topTag = sortedTags.length > 0 ? sortedTags[0] : ['none', 0];
            const topTagPct = events.length > 0 ? ((topTag[1] / events.length) * 100).toFixed(1) : 0;
            const riskPct = events.length > 0 ? ((riskCount / events.length) * 100).toFixed(1) : 0;

            document.getElementById('finding-behavior').textContent = 
                `Players trend ${topTag[0]} (${topTagPct}%). Risk-seeking is ${riskPct}% of decisions.`;

            const ctx = document.getElementById('behaviorChart');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: sortedTags.slice(0, 5).map(t => t[0]),
                    datasets: [{
                        data: sortedTags.slice(0, 5).map(t => t[1]),
                        backgroundColor: palette,
                        borderWidth: 2,
                        borderColor: colors.tooltipBg,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { animateScale: true, animateRotate: true, duration: 2000, easing: 'easeOutQuart' },
                    plugins: {
                        legend: { position: 'right', labels: { boxWidth: 10, color: colors.text, font: { size: 10 } } },
                        tooltip: tooltipOptions
                    },
                    cutout: '75%'
                }
            });
        }

        function drawTimeChart(events) {
            const buckets = {'<10s': 0, '10-20s': 0, '20-30s': 0, '30-60s': 0, '>60s': 0};
            events.forEach(e => {
                const t = e.decisionTimeMs;
                if (t != null) {
                    if (t < 10000) buckets['<10s']++;
                    else if (t < 20000) buckets['10-20s']++;
                    else if (t < 30000) buckets['20-30s']++;
                    else if (t < 60000) buckets['30-60s']++;
                    else buckets['>60s']++;
                }
            });

            let peakBucket = '<10s';
            let maxCount = -1;
            for (const [k, v] of Object.entries(buckets)) {
                if (v > maxCount) {
                    maxCount = v;
                    peakBucket = k;
                }
            }
            const outliers = buckets['>60s'];

            document.getElementById('finding-time').textContent = 
                `Most decisions land in ${peakBucket}. ${outliers} outliers exceeded 60s.`;

            const ctx = document.getElementById('timeChart');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(buckets),
                    datasets: [{
                        data: Object.values(buckets),
                        backgroundColor: colors.primary,
                        borderRadius: 2,
                        barPercentage: 0.6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        y: { duration: 1500, easing: 'easeOutQuart', from: 0 }
                    },
                    plugins: { legend: { display: false }, tooltip: tooltipOptions },
                    scales: {
                        y: { beginAtZero: true, grid: { color: colors.grid, drawBorder: false } },
                        x: { grid: { display: false, drawBorder: false } }
                    }
                }
            });
        }

        function drawRiskChart(sessions) {
            const completed = sessions.filter(s => s.metrics && s.metrics.avgDecisionTime != null);
            
            const labels = [];
            const riskData = [];
            const pressureData = [];
            const consistencyData = [];

            completed.forEach((s, i) => {
                labels.push(`S${i+1}`);
                riskData.push(s.metrics.riskScore || 0);
                pressureData.push(s.metrics.pressureSensitivity || 0);
                consistencyData.push(s.metrics.consistencyScore || 0);
            });

            const avgRisk = riskData.length > 0 ? (riskData.reduce((a,b)=>a+b,0) / riskData.length).toFixed(2) : 0;
            const avgConsistency = consistencyData.length > 0 ? (consistencyData.reduce((a,b)=>a+b,0) / consistencyData.length).toFixed(2) : 0;

            document.getElementById('finding-risk').textContent = 
                `Avg risk score ${avgRisk}. Consistency score ${avgConsistency} — players shift behavior across scenarios.`;

            const ctx = document.getElementById('riskChart');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Risk', data: riskData, backgroundColor: colors.warning },
                        { label: 'Pressure', data: pressureData, backgroundColor: colors.quaternary },
                        { label: 'Consistency', data: consistencyData, backgroundColor: colors.secondary }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        y: { duration: 1500, easing: 'easeOutQuart', from: 0 }
                    },
                    plugins: { 
                        legend: { position: 'top', labels: { boxWidth: 8, color: colors.text } },
                        tooltip: tooltipOptions
                    },
                    scales: {
                        y: { beginAtZero: true, max: 1, grid: { color: colors.grid, drawBorder: false } },
                        x: { grid: { display: false, drawBorder: false } }
                    }
                }
            });
        }

        function drawFunnelChart(events) {
            const stepCounts = {};
            const stepText = {};
            events.forEach(e => {
                if (e.stepId) {
                    stepCounts[e.stepId] = (stepCounts[e.stepId] || 0) + 1;
                    if (!stepText[e.stepId] && e.scenarioText) {
                        stepText[e.stepId] = e.scenarioText;
                    }
                }
            });

            const sortedSteps = Object.entries(stepCounts).sort((a, b) => b[1] - a[1]);
            const topStep = sortedSteps.length > 0 ? sortedSteps[0][0] : 'N/A';
            const topCount = sortedSteps.length > 0 ? sortedSteps[0][1] : 0;
            
            let dropoffStep = 'N/A';
            for (const [step, count] of sortedSteps) {
                if (count < 20) { dropoffStep = step; break; }
            }

            document.getElementById('finding-funnel').textContent = 
                `${topStep} gets ${topCount} events. Drop-off begins at ${dropoffStep}.`;

            const ctx = document.getElementById('funnelChart');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedSteps.map(s => s[0]),
                    datasets: [{
                        data: sortedSteps.map(s => s[1]),
                        backgroundColor: colors.secondary,
                        borderRadius: 2,
                        barPercentage: 0.6
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        x: { duration: 1500, easing: 'easeOutQuart', from: 0 }
                    },
                    plugins: { 
                        legend: { display: false }, 
                        tooltip: {
                            ...tooltipOptions,
                            callbacks: {
                                beforeBody: function(context) {
                                    const stepId = context[0].label;
                                    const rawText = stepText[stepId];
                                    if (!rawText) return [];
                                    
                                    const maxLen = 50;
                                    const lines = [""];
                                    rawText.split('\n').forEach(segment => {
                                        const words = segment.split(' ');
                                        let currentLine = '';
                                        words.forEach(word => {
                                            if ((currentLine + word).length > maxLen) {
                                                lines.push(currentLine.trim());
                                                currentLine = word + ' ';
                                            } else {
                                                currentLine += word + ' ';
                                            }
                                        });
                                        if (currentLine) lines.push(currentLine.trim());
                                    });
                                    lines.push(""); // Add spacing before data
                                    return lines;
                                }
                            }
                        } 
                    },
                    scales: {
                        x: { beginAtZero: true, grid: { color: colors.grid, drawBorder: false } },
                        y: { grid: { display: false, drawBorder: false } }
                    }
                }
            });
        }

        // Initialize with a slight delay to allow entrance animations to play
        setTimeout(init, 300);
    </script>
</body>
</html>
